<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tony's Window Cleaning — Free Quotes Call Sign (11×8.5 landscape)</title>
<link rel="stylesheet" href="brand-print.css">
<style>
  @page{size:11in 8.5in;margin:0}
  body{
    background:
      radial-gradient(8in 6in at 85% 0%, rgba(63,134,201,.5) 0%, rgba(63,134,201,0) 60%),
      radial-gradient(9in 7in at 0% 100%, rgba(29,74,120,.8) 0%, rgba(29,74,120,0) 65%),
      linear-gradient(160deg, var(--navy-900) 0%, var(--navy-800) 55%, var(--navy-600) 100%);
    display:flex;flex-direction:column;align-items:center;
    position:relative;color:#fff;
  }
  .sparkle{position:absolute;opacity:.9}
  .s1{top:.75in;left:.85in;font-size:42px;color:var(--brand-300)}
  .s2{top:2.1in;right:1in;font-size:30px;color:var(--gold-400)}
  .s3{bottom:2.3in;left:1.25in;font-size:26px;color:var(--brand-400)}

  .brandline{
    margin-top:.42in;
    font-family:var(--font-head);font-weight:800;font-size:30px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--sky-200);
  }
  .brandline strong{color:#fff}

  .big{
    margin-top:.42in;text-align:center;
  }
  .big .free{font-size:136px;display:block}
  .callortext{
    margin-top:.5in;
    font-size:27px;font-weight:800;letter-spacing:.42em;text-transform:uppercase;
    color:var(--gold-400);
  }
  .phone-wrap{margin-top:.22in;text-align:center}
  .phone{font-size:112px;letter-spacing:.02em}

  .stars-row{
    margin-top:.55in;font-size:24px;font-weight:700;color:var(--sky-100);
    display:flex;align-items:center;gap:.26in;
  }
  .stars-row .stars{font-size:31px}

  .svc-band{
    margin-top:auto;width:100%;
    background:linear-gradient(120deg,var(--gold-400) 0%,var(--gold-500) 55%,var(--gold-600) 100%);
    color:var(--navy-900);
    padding:.22in .3in;
    display:flex;justify-content:center;gap:.26in;
    font-weight:800;font-size:19.5px;letter-spacing:.02em;white-space:nowrap;
  }
  .svc-band .dot{color:var(--navy-800);opacity:.55}
</style>
</head>
<body class="landscape">
  <span class="sparkle s1">✦</span>
  <span class="sparkle s2">✦</span>
  <span class="sparkle s3">✦</span>

  <div class="brandline">Tony's <strong>Window Cleaning</strong></div>

  <div class="big">
    <span class="t3d t3d-gold free" data-text="FREE QUOTES">FREE QUOTES</span>
  </div>

  <div class="callortext">Call or Text</div>
  <div class="phone-wrap">
    <span class="t3d t3d-ice phone" data-text="714-559-0300">714-559-0300</span>
  </div>

  <div class="stars-row">
    <span class="stars">★★★★★</span>
    <span>5.0 on Google</span>
    <span>·</span>
    <span>twindowclean.com</span>
  </div>

  <div class="svc-band gloss-band">
    <span>Windows</span><span class="dot">✦</span>
    <span>Solar Panels</span><span class="dot">✦</span>
    <span>Pigeon Proofing</span><span class="dot">✦</span>
    <span>Pressure Washing</span><span class="dot">✦</span>
    <span>Bin Cleaning</span>
  </div>
</body>
</html>
