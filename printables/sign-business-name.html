<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tony's Window Cleaning — Business Name Sign (11×8.5 landscape)</title>
<link rel="stylesheet" href="brand-print.css">
<style>
  @page{size:11in 8.5in;margin:0}
  body{
    background:
      radial-gradient(9in 6in at 88% -8%, var(--gold-300) 0%, rgba(251,227,154,0) 55%),
      radial-gradient(10in 8in at -10% 110%, var(--sky-200) 0%, rgba(192,224,240,0) 60%),
      linear-gradient(180deg, var(--white) 0%, var(--sky-50) 55%, var(--sky-100) 100%);
    display:flex;flex-direction:column;align-items:center;
    position:relative;
  }
  /* sun in the corner, echoing the logo */
  .sun{
    position:absolute;top:.55in;right:.6in;width:1.5in;height:1.5in;
    background:radial-gradient(circle at 38% 34%, #fff3cf 0%, var(--gold-400) 38%, var(--gold-500) 62%, var(--gold-600) 100%);
    border-radius:50%;
    box-shadow:0 0 0 .09in rgba(255,255,255,.9), 0 .14in .3in rgba(224,153,42,.45);
  }
  .sun::before{
    content:"";position:absolute;inset:-.42in;border-radius:50%;
    background:repeating-conic-gradient(from 8deg, var(--gold-400) 0deg 9deg, transparent 9deg 30deg);
    -webkit-mask:radial-gradient(circle, transparent 54%, #000 55%, #000 72%, transparent 73%);
    mask:radial-gradient(circle, transparent 54%, #000 55%, #000 72%, transparent 73%);
  }
  .sparkle{position:absolute;color:var(--brand-400);opacity:.85}
  .s1{top:1.1in;left:.9in;font-size:44px}
  .s2{top:2.4in;left:1.7in;font-size:26px;color:var(--brand-300)}
  .s3{top:1.7in;right:2.6in;font-size:30px;color:var(--gold-500)}

  .top-chip{
    margin-top:.62in;
    background:var(--navy-800);color:#fff;
    padding:.14in .5in;font-size:22px;letter-spacing:.14em;
    text-transform:uppercase;
    border-radius:999px;
    box-shadow:0 .1in .25in rgba(16,48,80,.35);
  }
  .top-chip .stars{color:var(--gold-400);margin-right:.18em}

  .name{
    margin-top:.5in;text-align:center;
  }
  .name .line1{font-size:158px;display:block}
  .name .line2{font-size:82px;display:block;margin-top:.26in;letter-spacing:.04em}

  .tagline{
    margin-top:.62in;
    font-size:26px;font-weight:700;color:var(--navy-700);
    letter-spacing:.28em;text-transform:uppercase;
  }
  .tagline .dot{color:var(--gold-600);margin:0 .35em}

  .contact{
    margin-top:auto;margin-bottom:0;
    width:100%;
    background:linear-gradient(120deg,var(--navy-900) 0%,var(--navy-800) 55%,var(--navy-600) 100%);
    display:flex;align-items:center;justify-content:center;gap:.7in;
    padding:.34in 0 .4in;
  }
  .phone{font-family:var(--font-head);font-weight:800;font-size:64px;color:#fff;display:flex;align-items:center;gap:.22in}
  .phone svg{width:.62in;height:.62in;fill:var(--gold-500)}
  .site{font-size:34px;font-weight:700;color:var(--sky-200)}
</style>
</head>
<body class="landscape">
  <div class="sun"></div>
  <span class="sparkle s1">✦</span>
  <span class="sparkle s2">✦</span>
  <span class="sparkle s3">✦</span>

  <div class="top-chip gloss-band"><span class="stars">★★★★★</span> Rated 5 Stars on Google</div>

  <div class="name">
    <span class="t3d t3d-gold line1" data-text="TONY'S">TONY'S</span>
    <span class="t3d t3d-navy line2" data-text="WINDOW CLEANING">WINDOW CLEANING</span>
  </div>

  <div class="tagline">Streak-Free<span class="dot">✦</span>Satisfaction Guaranteed</div>

  <div class="contact gloss-band">
    <span class="phone">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8a15.5 15.5 0 006.6 6.6l2.2-2.2a1 1 0 011-.24c1.1.37 2.3.57 3.5.57a1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.2.2 2.4.57 3.5a1 1 0 01-.24 1l-2.23 2.3z"/></svg>
      714-559-0300
    </span>
    <span class="site">twindowclean.com</span>
  </div>
</body>
</html>
